# ── Logging ───────────────────────────────────────────────────────────────────
# Console pattern: timestamp | level | thread | class | message
logging.pattern.console=%d{HH:mm:ss.SSS} %clr(%-5level) [%thread] %clr(%logger{36}){cyan} - %msg%n

# Write logs to a file (view live in VS Code with "Open File" then tail it)
logging.file.name=logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5


# Log levels — adjust per package
logging.level.root=INFO
logging.level.com.backendauth=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
